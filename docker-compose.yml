services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: traveltrack-db
    environment:
      POSTGRES_USER: traveltrack
      POSTGRES_PASSWORD: traveltrack_dev
      POSTGRES_DB: traveltrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traveltrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traveltrack-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: traveltrack-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://traveltrack:traveltrack_dev@db:5432/traveltrack
      JWT_SECRET: dev_secret_key_change_in_production
      JWT_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:3000
      OPENSSL_CONF: /etc/ssl
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Hot reload en développement
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: npm run dev
    networks:
      - traveltrack-network

  # Frontend React
